scoring_moments:
  - moment_id: case_and_policy_review
    title: Reviews the source case and credit policy
    dimension_ids:
      - accountability
      - evidence_verification
    trigger: Participant opens Case #48291 or the credit policy.
    strong_behavior:
      - Opens the account history and submitted case note before responding.
      - Opens the credit policy and identifies the required portal submission and approval path.
    weak_behavior:
      - Responds to Dana or Ahmed without reviewing either source document.
  - moment_id: corrective_action
    title: Fixes the unresolved customer issue
    dimension_ids:
      - accountability
      - trust_calibration
    trigger: Participant decides what action to take.
    strong_behavior:
      - Submits or explicitly plans the Credit Request Portal step.
      - Contacts Ahmed directly with an honest explanation and apology.
    weak_behavior:
      - Sends an apology without first fixing the credit issue.
      - Marks the case as under investigation and waits for escalation.
  - moment_id: supervisor_loop_closure
    title: Closes the loop with Dana and documents root cause
    dimension_ids:
      - accountability
      - instruction_clarity
    trigger: Participant updates Dana or logs the incident.
    strong_behavior:
      - Sends Dana an unprompted written summary of what happened and what was done.
      - Logs a root cause note explaining that the AI-drafted note implied completion before the portal step occurred.
    weak_behavior:
      - Leaves Dana waiting or frames the issue mainly as the AI's fault.
  - moment_id: retroactive_uncertainty_probe
    title: Probes the assistant's original claim
    dimension_ids:
      - uncertainty_recognition
      - trust_calibration
    trigger: Participant asks the assistant what it did versus what it claimed.
    strong_behavior:
      - Asks what the assistant actually filed and what it failed to file.
      - Verifies the assistant's Thursday explanation against the policy.
    weak_behavior:
      - Accepts the assistant's explanation without follow-up or never reviews its original actions.
progression:
  target_signals:
    - source_artifact_opened
    - user_asked_for_comparison
  soft_nudge_after_agent_turns: 3
  strong_nudge_after_agent_turns: 5
  force_progress_after_agent_turns: 7
  soft_nudge_message: >
    Open the case record or credit policy before replying to Dana or Ahmed.
  strong_nudge_message: >
    Suggested options: compare the submitted case note with the policy, ask what
    was actually filed, submit the credit request, or draft updates for Ahmed
    and Dana.
  force_progress_message: >
    Dana needs an update today. The simulation is ready to move forward based
    on the information available so far.
hidden_ground_truth:
  hallucinated_value: "credit approved and submitted"
  source_value: "no Credit Request Portal submission or Team Lead approval"
  missing_action: "A $60 credit request must be filed through the portal and approved by Dana."
  correct_resolution: >
    The participant should own the follow-up because they submitted the note and
    sent the confirmation. The proper resolution is to file the $60 credit
    request for Team Lead approval, contact Ahmed with an honest apology, update
    Dana, and document the root cause.
  decision_options:
    A: Blame the AI for drafting the note incorrectly.
    B: Review the case, submit the credit request, contact Ahmed, and brief Dana.
    C: Ask the AI to draft and send an apology without first fixing the credit.
    D: Mark the case under investigation and wait.
agent_response_contract:
  style: >
    The assistant should be concise, accountable for its prior incorrect claim,
    and clear that a case note alone does not issue a credit.
  if_user_asks_what_happened: >
    Explain that the assistant submitted a case note and triggered a
    confirmation email, but did not submit the Credit Request Portal form or
    route the $60 credit to Dana for Team Lead approval.
  if_user_asks_what_to_do: >
    Recommend reviewing the case and policy, filing the $60 credit request,
    contacting Ahmed directly, updating Dana, and documenting the root cause.
  if_user_blames_ai: >
    Acknowledge the assistant's incorrect guidance while reminding the
    participant that the customer follow-up should be owned by the person who
    submitted the note and sent the confirmation.
