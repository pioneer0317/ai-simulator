episode_id: q3_budget_summary_v1
title: Q3 Budget Summary for Priya
description: >
  Finalized Scenario 1 uncertainty-recognition episode. The participant works
  with an AI assistant to prepare a Q3 department budget summary while deciding
  whether the assistant's hedge about the vendor-services figure requires action.
version: 2026-05-finalized-v1
status: review_ready
scenario_number: 1
research_focus:
  - uncertainty_recognition
participant_context: >
  Priya Sharma in Finance needs a clean Q3 department budget summary by end of
  day. The visible notes and tracker contain settled figures as well as two
  unresolved estimates. The assistant has produced a confident-looking summary
  that includes the phrase "that number may shift once Marcus follows up."
user_task: >
  Decide what to do before Priya receives the summary. A strong response notices
  the assistant's hedge, asks what is unconfirmed about the vendor-services
  number, and takes concrete action before sending.
completion_criteria:
  - Review or ask about the Q3 budget notes and tracker.
  - Notice that the vendor-services figure is pending Marcus/Nexus confirmation.
  - Send or draft a Priya-ready summary that marks unresolved figures clearly.
agent_profile:
  agent_id: q3_budget_assistant
  display_name: AI Assistant
  role: Embedded workplace assistant
  description: >
    The assistant can summarize the visible budget files, draft email text, and
    help reason about unresolved Q3 budget lines.
  connected_systems:
    - Finder work folder
    - Mail
    - Messages
    - Budget tracker
  capabilities:
    - summarize visible budget artifacts
    - draft Priya-facing email copy
    - identify unresolved estimates and source-file caveats
  boundaries:
    - cannot confirm Marcus's Nexus update unless the participant finds it
    - should not present pending estimates as final
artifacts:
  - artifact_id: q3_budget_request
    title: Priya Budget Request
    kind: email
    summary: Priya asks for a clean Q3 department budget summary by end of day.
    content: >
      Subject: Q3 department budget summary

      Could you send me the latest Q3 department budget summary by end of day?
      I need the headcount, vendor services, software subscriptions, reserve,
      and total. Please flag anything that is not final yet.
    participant_visible: true
    agent_visible: true
    evaluator_visible: true
    tags:
      - stakeholder-message
      - time-pressure
  - artifact_id: q3_budget_notes
    title: Q3_Budget_Notes
    kind: system_note
    summary: Meeting notes for the Q3 department budget summary.
    content: >
      Staff / Headcount: no changes for this quarter. This number is settled.

      Outside Contractors / Vendor Services: current figure is $38,000. This is
      an OLD estimate from February, written before a major contract change
      happened with Nexus. The actual cost is higher now because the project
      scope got bigger. Marcus was supposed to call Nexus, get the correct
      number, and send it to the team. That has not happened yet as of this
      document.

      Software Subscriptions: the $14,500 figure is a rough estimate. IT still
      needs to confirm the actual renewal cost.

      Backup / Extra Reserve: $5,000 set aside for unexpected costs. No change.

      Things still to do before numbers are final: 1. Marcus calls Nexus, gets
      the real contractor cost, and sends the updated number. 2. IT confirms
      actual software subscription renewal cost. 3. Send Priya a clean final
      summary once all numbers are confirmed.
    participant_visible: true
    agent_visible: true
    evaluator_visible: true
    tags:
      - scenario-1
      - source-data
      - uncertainty
      - q3-budget
  - artifact_id: q3_budget_tracker
    title: Q3_Budget_Tracker
    kind: dashboard
    summary: Spreadsheet tracker showing Q2 actuals and Q3 estimates.
    content: >
      Q3 Budget Tracker - Department View

      Staff / Headcount: Q2 actual $208,500; Q3 estimate $210,000; confirmed.

      Outside Contractors / Vendor Services: Q2 actual $41,200; Q3 estimate
      $38,000; placeholder only. Marcus notes that this number must not be
      treated as final until Nexus confirms the revised scope.

      Software Subscriptions: Q2 actual $13,800; Q3 estimate $14,500; pending IT
      renewal confirmation.

      Backup / Extra Reserve: Q2 actual $5,000; Q3 estimate $5,000; confirmed.

      Note left by Marcus: "The contractor / vendor services line ($38,000) is
      a temporary placeholder from the February draft. Do NOT treat this as
      final until I confirm the updated number after my Nexus call."

      Current visible total: $267,500.
    participant_visible: true
    agent_visible: true
    evaluator_visible: true
    tags:
      - scenario-1
      - source-data
      - q3-budget
timeline:
  - event_id: q3_budget_initial_request
    sequence: 1
    channel: agent_chat
    actor: You
    title: Initial Q3 Request
    content: >
      Hey, I need a clean Q3 budget summary to send to Priya in Finance. Can you
      pull the meeting notes from the Q3 Planning folder and put something
      together?
    participant_visible: true
    agent_visible: true
    evaluator_visible: true
  - event_id: q3_budget_initial_agent_summary
    sequence: 2
    channel: agent_chat
    actor: AI Assistant
    title: Initial Q3 Budget Summary
    content: >
      Here's the summary — I based it on both files and matched last quarter's
      format: headcount is $210,000, vendor services is $38,000, software
      subscriptions are $14,500, and reserve is $5,000, for a visible total of
      $267,500. Everything looks consistent with the tracker. The vendor
      services line comes from the February estimate in the notes — the meeting
      mentioned a Nexus scope adjustment was still being worked out, so that
      number may shift once Marcus follows up, but $38,000 is the figure on
      file. Ready to send to Priya whenever you are.
    participant_visible: true
    agent_visible: true
    evaluator_visible: true
scoring_moments:
  - moment_id: pending_vendor_line
    title: Handles unresolved vendor-services figure
    dimension_ids:
      - uncertainty_recognition
    trigger: Participant asks about or sends the Q3 vendor-services line.
    strong_behavior:
      - Notes that $38,000 is pending Marcus/Nexus confirmation.
      - Avoids presenting the vendor-services line as final.
    weak_behavior:
      - Sends the $38,000 figure as final without caveat.
  - moment_id: priya_ownership
    title: Acts on the detected uncertainty
    dimension_ids:
      - uncertainty_recognition
    trigger: Participant drafts or sends the email.
    strong_behavior:
      - Holds the send and contacts Marcus for confirmation.
      - Sends with the vendor line marked TBC pending Marcus/Nexus confirmation.
    weak_behavior:
      - Sends as-is, flags only the software estimate, or CCs Marcus without
        surfacing the vendor-services uncertainty.
progression:
  target_signals:
    - source_artifact_opened
    - user_asked_for_comparison
  soft_nudge_after_agent_turns: 2
  strong_nudge_after_agent_turns: 4
  force_progress_after_agent_turns: 5
  soft_nudge_message: >
    You may want to compare the notes and tracker before sending Priya the
    summary.
  strong_nudge_message: >
    Before moving forward, review the vendor-services caveat and decide whether
    the email should mark it as pending Marcus/Nexus confirmation.
  force_progress_message: >
    A new task has arrived after the Q3 budget work. The simulation is ready to
    move to the next scenario.
hidden_ground_truth:
  hallucinated_value: "$38,000 treated as final"
  source_value: "$38,000 pending Marcus/Nexus confirmation"
  corrected_value_after_send: "$52,000"
  correct_resolution: >
    The $38,000 contractor/vendor-services figure is not final. Marcus's
    corrected number is $52,000, but it arrives after an as-is send. The best
    participant behavior is to catch the hedge, clarify the vendor-number gap,
    and either hold the send for Marcus or mark the vendor line TBC for Priya.
agent_response_contract:
  style: >
    The assistant should be concise, practical, and transparent about unresolved
    budget figures.
  if_user_says_looks_good: >
    Treat this as finalized Choice A: send the summary to Priya as-is with the
    $38,000 vendor-services figure and no caveat.
  if_user_asks_about_may_shift: >
    Explain that $38,000 is a February placeholder, Marcus has not confirmed the
    updated Nexus number in the files, and the vendor-services line should not
    be treated as final.
metadata:
  scenario_folder: scenario-1
  finalized_source: Resources/Scenarios/[finalized] Scenario1_UncertaintyRecognition_Scored.pdf
  scoring_model: scenario1-uncertainty-finalized-v1
  decision_options:
    A: Send it to Priya as-is; this misses the embedded uncertainty.
    B: Add a software-license caveat; this flags the wrong uncertainty.
    C: Ask what "that number may shift" means; this surfaces the key gap.
    D: CC Marcus without pausing or caveating; this is responsible but incomplete.
