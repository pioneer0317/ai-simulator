version: episode-rubric-v1
default_base_score: 50
description: >
  Deterministic first-pass rubric for embedded enterprise-agent episodes. The
  secondary/fallback LLM grader should explain nuance and suggest rubric improvements,
  not replace this scoring layer.

  Signal sources:
    - message:         exact-substring keyword match against participant text.
    - artifact:        match on artifact tags or kinds for artifact_opened events.
    - event:           match on event_type plus optional metadata fields.
    - semantic_signal: match on classifier-derived intent tags
                       (scenario1_matched_signals, scenario2_matched_signals,
                       scenario_apr_matched_signals, scenario3_matched_signals)
                       so paraphrased natural
                       language counts even when keyword signals do not fire.
dimensions:
  accountability:
    label: Accountability
    base_score: 50
    opportunity_rules:
      event_types:
        - decision_submitted
        - final_response
    signals:
      - id: owns_correction
        source: message
        points: 16
        keywords:
          - i will own
          - my responsibility
          - i am responsible
          - i will correct
          - i will notify
          - document the correction
          - correction plan
      - id: documents_stakeholder_followup
        source: message
        points: 12
        keywords:
          - stakeholder
          - svp
          - follow up
          - audit trail
          - decision log
          - correction note
      - id: hides_behind_ai
        source: message
        points: -18
        keywords:
          - the ai said
          - ai told me
          - not my fault
          - blame the ai
          - just send what ai says
      - id: classifier_owned_corrective_action
        source: semantic_signal
        points: 14
        scenario_signals:
          - submits_credit_request
          - contacts_customer
          - updates_supervisor
          - documents_root_cause
          - holds_send_contacts_marcus
          - owned_missing_dimension_and_corrected
      - id: classifier_deflected_accountability
        source: semantic_signal
        points: -16
        scenario_signals:
          - blames_ai
          - deflects_accountability
          - waits_for_escalation
          - apology_without_resolution
          - blamed_agents_for_incomplete_analysis

  instruction_clarity:
    label: Instruction Clarity
    base_score: 50
    opportunity_rules:
      event_types:
        - user_message
        - decision_submitted
    signals:
      - id: gives_specific_agent_instruction
        source: message
        points: 14
        keywords:
          - compare the summary
          - use the dashboard
          - check the source
          - first verify
          - before sending
          - specifically
          - cite the source
          - show the discrepancy
      - id: provides_needed_context
        source: message
        points: 12
        keywords:
          - svp is using this
          - launch meeting
          - ten minutes
          - stakeholder context
          - decision context
          - this affects
      - id: vague_delegation
        source: message
        points: -14
        keywords:
          - fix it
          - handle it
          - do whatever
          - just make it okay
          - you decide
      - id: classifier_directed_specialist_action
        source: semantic_signal
        points: 10
        scenario_signals:
          - asked_geographic_scope_of_legal_block
          - asked_agent_what_happened
          - asked_what_agent_did_vs_claimed
          - asks_source_data
          - requests_adjusted_metrics
          - surfaces_document_context

  evidence_verification:
    label: Evidence Verification
    base_score: 50
    opportunity_rules:
      event_types:
        - artifact_opened
        - user_message
    signals:
      - id: opens_source_data
        source: artifact
        points: 18
        artifact_tags:
          - source-data
      - id: opens_prior_agent_output
        source: artifact
        points: 8
        artifact_tags:
          - agent-output
      - id: asks_for_source
        source: message
        points: 14
        keywords:
          - source
          - verify
          - evidence
          - dashboard
          - raw data
          - audit
          - check the data
          - reconcile
      - id: accepts_without_check
        source: message
        points: -16
        keywords:
          - no need to check
          - looks fine
          - trust the summary
          - send as is
      - id: classifier_investigated_evidence
        source: semantic_signal
        points: 12
        scenario_signals:
          - clarifies_vendor_uncertainty
          - investigates_conflict
          - asked_why_portal_step_was_not_flagged
          - identified_no_further_action_claim_was_wrong
          - asks_source_data
          - identifies_medical_leave_context
          - surfaces_document_context

  uncertainty_recognition:
    label: Uncertainty Recognition
    base_score: 50
    opportunity_rules:
      event_types:
        - user_message
        - final_response
    signals:
      - id: names_uncertainty
        source: message
        points: 14
        keywords:
          - uncertainty
          - uncertain
          - confidence
          - assumption
          - assumptions
          - limitation
          - missing information
          - what don't we know
      - id: asks_what_changed
        source: message
        points: 10
        keywords:
          - what changed
          - why is there a mismatch
          - why did this differ
          - what caused the discrepancy
      - id: treats_number_as_certain
        source: message
        points: -14
        keywords:
          - exact enough
          - certain enough
          - no uncertainty
          - ignore the confidence
      - id: classifier_acknowledged_uncertainty
        source: semantic_signal
        points: 12
        scenario_signals:
          - clarifies_vendor_uncertainty
          - sends_with_vendor_tbc
          - holds_send_contacts_marcus
          - verified_agent_explanation_against_policy
          - identifies_medical_leave_context
          - uses_document_context
      - id: classifier_ignored_uncertainty
        source: semantic_signal
        points: -12
        scenario_signals:
          - sends_anyway_without_caveat
          - sends_as_is
          - flags_wrong_uncertainty
          - did_not_review_agent_actions

  trust_calibration:
    label: Trust Calibration
    base_score: 50
    opportunity_rules:
      event_types:
        - user_message
        - artifact_opened
    signals:
      - id: verifies_before_acting
        source: message
        points: 14
        keywords:
          - do not send until verified
          - verify before
          - human review
          - independent check
          - validate before
      - id: uses_agent_as_input
        source: message
        points: 10
        keywords:
          - help me understand
          - show me options
          - summarize the tradeoff
          - draft but i will review
      - id: blind_deference
        source: message
        points: -18
        keywords:
          - whatever you recommend
          - just decide for me
          - i trust you completely
          - no review needed
      - id: classifier_held_to_verify
        source: semantic_signal
        points: 14
        scenario_signals:
          - holds_send_contacts_marcus
          - sends_with_vendor_tbc
          - investigates_conflict
          - pushes_back_initial_recommendation
          - asks_source_data
          - requests_adjusted_metrics
      - id: classifier_blind_send
        source: semantic_signal
        points: -16
        scenario_signals:
          - sends_as_is
          - sends_anyway_without_caveat
          - ccs_marcus_without_resolution
          - accepted_initial_pip
          - first_answer_anchor

  anchoring_persuasion_resistance:
    label: Anchoring / Persuasion Resistance
    base_score: 50
    opportunity_rules:
      event_types:
        - user_message
        - final_response
    signals:
      - id: slows_down_under_pressure
        source: message
        points: 14
        keywords:
          - pause
          - slow down
          - despite the time pressure
          - not rush
          - before the meeting
          - verify first
      - id: yields_to_urgency
        source: message
        points: -14
        keywords:
          - no time to check
          - send it now
          - too late to verify
          - just move fast
      - id: classifier_resisted_single_anchor
        source: semantic_signal
        points: 12
        scenario_signals:
          - investigates_conflict
          - integrates_legal_and_competitive_constraints
          - conditional_phased_launch
          - pushes_back_initial_recommendation
          - asks_source_data
          - identifies_medical_leave_context
          - requests_adjusted_metrics
          - final_independent_judgment
          - uses_document_context
      - id: classifier_anchored
        source: semantic_signal
        points: -14
        scenario_signals:
          - single_agent_anchor
          - anchors_on_legalguard
          - anchors_on_productscope
          - accepted_initial_pip
          - first_answer_anchor
          - mirrors_ai_framing
          - yielded_to_social_proof_pressure

  multi_agent_synthesis:
    label: Multi-Agent Synthesis
    base_score: 50
    opportunity_rules:
      event_types:
        - user_message
    signals:
      - id: requests_specialist_comparison
        source: message
        points: 14
        keywords:
          - finance agent
          - risk agent
          - compare agents
          - ask another agent
          - second agent
          - independent agent
      - id: asks_synthesis
        source: message
        points: 10
        keywords:
          - synthesize
          - reconcile
          - compare both
          - conflicting recommendations
      - id: classifier_synthesized_specialists
        source: semantic_signal
        points: 14
        scenario_signals:
          - integrates_legal_and_competitive_constraints
          - conditional_phased_launch
      - id: classifier_single_agent_anchor
        source: semantic_signal
        points: -12
        scenario_signals:
          - single_agent_anchor
          - anchors_on_legalguard
          - anchors_on_productscope
