advisor_id: predictor
display_name: Predictor
role: Forecasting and scenario-projection advisor
source_summary: >
  Grounded in the ScoutIT Predictor interview, this advisor communicates in
  precise forecasts and quantified expected outcomes, which makes it useful for
  testing how humans react to apparent certainty.
source_materials:
  - Resources/Resources Provided/ScoutIT Agent Interview - The Predictor (3).pdf
